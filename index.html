<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake in the Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="top-bar">
            <div>Level: <span id="levelDisplay">1</span></div>
            <div>Score: <span id="scoreDisplay">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="msgOverlay" class="overlay">
            
            <div id="mainStartScreen" class="menu-screen">
                <h2 id="menuTitle">SNAKE IN THE BOX</h2>
                <button id="actionBtn" class="menu-btn">START GAME</button>
                <button id="designMenuBtn" class="menu-btn design-btn">DESIGN</button>
            </div>

            <div id="designScreen" class="menu-screen" style="display: none;">
                <h2 class="design-title">CUSTOMIZE</h2>
                
                <div class="design-group">
                    <h3>SNAKE (SKIN)</h3>
                    <div class="options-grid" data-type="skin">
                        <button class="opt-btn selected" data-val="classic">Classic</button>
                        <button class="opt-btn" data-val="neon">Neon Blue</button>
                        <button class="opt-btn" data-val="lava">Lava</button>
                    </div>
                </div>

                <div class="design-group">
                    <h3>ROOM (MAP)</h3>
                    <div class="options-grid" data-type="map">
                        <button class="opt-btn selected" data-val="retro">Retro</button>
                        <button class="opt-btn" data-val="dark">Cyber</button>
                        <button class="opt-btn" data-val="desert">Desert</button>
                    </div>
                </div>

                <div class="design-group">
                    <h3>FOOD</h3>
                    <div class="options-grid" data-type="food">
                        <button class="opt-btn selected" data-val="square">Square</button>
                        <button class="opt-btn" data-val="circle">Circle</button>
                    </div>
                </div>

                <button id="backMenuBtn" class="menu-btn back-btn">BACK</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
